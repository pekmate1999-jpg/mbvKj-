# ═══════════════════════════════════════════════════════════════════
#  MBVK Monitor – Konfigurációs fájl
#  Szerkesztési útmutató:
#    - A súlyok (weight) azt jelzik, mekkora szerepe van az adott
#      kritériumnak a végső pontszámban. Az összsúly nem kell 100 legyen,
#      a program normalizálja automatikusan.
#    - A pontszám 1–5 skálán jelenik meg a Telegram üzenetben.
#    - Csak azok az ingatlanok kapnak értesítést, amelyek elérik
#      a min_score küszöbértéket.
# ═══════════════════════════════════════════════════════════════════

# ── Általános szűrők ────────────────────────────────────────────────
filters:
  max_price: 5_000_000          # Ft – ennél drágább ingatlan kiszűrve
  min_score: 3.0                # 1–5 skálán, ez alatti score nem kap értesítést
  only_movein_ready: true       # csak beköltözhető (moveln=true) ingatlanok

# ── Budapest-távolság pontozás ──────────────────────────────────────
# Minél közelebb van Budapesthez, annál magasabb pontot kap.
distance_score:
  enabled: true
  weight: 30                    # relatív súly (többi kritériumhoz képest)
  thresholds:                   # km – pont (interpolálva közte)
    - { max_km:  30, points: 5 }
    - { max_km:  60, points: 4 }
    - { max_km: 100, points: 3 }
    - { max_km: 150, points: 2 }
    - { max_km: 9999, points: 1 }

# ── Telekméret pontozás ─────────────────────────────────────────────
# Nagyobb telek = magasabb pont (ésszerű határokig).
land_size_score:
  enabled: true
  weight: 25                    # relatív súly
  thresholds:                   # m² – pont
    - { min_m2:    0, points: 1 }
    - { min_m2:  300, points: 2 }
    - { min_m2:  600, points: 3 }
    - { min_m2: 1000, points: 4 }
    - { min_m2: 2000, points: 5 }

# ── Ft/m² ár pontozás ──────────────────────────────────────────────
# Alacsonyabb Ft/m² = jobb vétel = magasabb pont.
# A ref_area alapján számít (telek > épület).
price_per_m2_score:
  enabled: true
  weight: 35                    # relatív súly (ez a legfontosabb)
  thresholds:                   # Ft/m² felső határ – pont (minél kisebb az ár, annál jobb)
    - { max_ft_per_m2:    500, points: 5 }
    - { max_ft_per_m2:   1500, points: 4 }
    - { max_ft_per_m2:   3000, points: 3 }
    - { max_ft_per_m2:   6000, points: 2 }
    - { max_ft_per_m2: 999999, points: 1 }

# ── Megye pontozás ─────────────────────────────────────────────────
# Megadható, hogy mely megyék kapjanak magasabb pontot.
# A nevek kis- és nagybetű érzéketlenek, ékezet mindegy.
county_score:
  enabled: true
  weight: 10                    # relatív súly
  scores:
    - { county: "Pest",                    points: 5 }
    - { county: "Budapest",                points: 5 }
    - { county: "Fejér",                   points: 4 }
    - { county: "Komárom-Esztergom",       points: 4 }
    - { county: "Győr-Moson-Sopron",       points: 3 }
    - { county: "Veszprém",                points: 3 }
    - { county: "Nógrád",                  points: 2 }
    - { county: "Heves",                   points: 2 }
    - { county: "Bács-Kiskun",             points: 2 }
    - { county: "Somogy",                  points: 1 }
    - { county: "Baranya",                 points: 1 }
  default_points: 1             # ha a megye nincs a listában
