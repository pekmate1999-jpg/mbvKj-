name: MBVK Monitor

on:
  schedule:
    # Minden nap reggel 8:00-kor fut le (UTC idő szerint, nálunk 9:00/10:00)
    - cron: '0 8 * * *'
  workflow_dispatch: # Ezzel a gombbal kézzel is el tudod indítani a GitHubon

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése (Checkout)
        uses: actions/checkout@v4

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Függőségek telepítése
        run: |
          pip install requests

      - name: Script futtatása
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python mbvk_monitor.py

      - name: Adatbázis mentése a GitHubra
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add mbvk_v7.db
          # Csak akkor commitol, ha valóban van új bejegyzés az adatbázisban
          git diff --quiet && git diff --staged --quiet || (git commit -m "Adatbázis frissítése: új MBVK találatok mentve" && git push)
