name: MBVK Monitor

on:
  schedule:
    # 23-as percre és 4,15-ös UTC órára állítva (Magyarul kb. 06:23 és 17:23)
    - cron: '23 4,15 * * *'   
  workflow_dispatch:
# 👇 EZ AZ ÚJ RÉSZ: Engedélyezi, hogy a GitHub Action módosíthassa a fájlokat a repódban
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests geopy
          
      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python mbvk_monitor.py

      # Az alábbi rész biztosítja, hogy az adatbázis módosításai megmaradjanak
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add mbvk_v8.db
          # Ha történt változás az adatbázisban, elmenti és visszatölti a repóba
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update database [skip ci]" && git push)
