name: MBVK Ingatlan Monitor

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Kod letoltese
        uses: actions/checkout@v4

      - name: Python kornyezet beallitasa
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Fuggosegek telepitese
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 requests
          python -m playwright install chromium --with-deps

      - name: Script futtatasa
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python mbvk_monitor.py

      - name: Adatbazis frissitese a repoban
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add mbvk_adatbazis.json || true
          git commit -m "Adatbazis frissitese [skip ci]" || true
          git push || true
